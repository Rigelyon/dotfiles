general {
    border_size = 2
    col.active_border = $base
    col.inactive_border = $mantle
    gaps_in = 4
    gaps_out = 8, 4, 4, 4
}

decoration {
    rounding = 20
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
        xray = true
        ignore_opacity = true
        special = true
        popups = true
    }
}

