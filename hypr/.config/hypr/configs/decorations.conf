general {
    border_size = 2
    col.active_border = $base
    col.inactive_border = $mantle
    gaps_in = 4
    gaps_out = 4
}

decoration {
    rounding = 8
  
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.8

    shadow {
        enabled = true
        range = 3
        render_power = 1
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
        ignore_opacity = true
        special = true
        popups = true
    }
}