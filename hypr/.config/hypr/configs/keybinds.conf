# -- Move to Workspace (mod + SHIFT + 0-9) --
# bindd = $mainMod SHIFT, 1, Move Window to Workspace 1, movetoworkspace, 1 #"Move Window to Workspace 1"
bindd = $mainMod SHIFT, code:10, Move Window to Workspace 1, movetoworkspace, 1
