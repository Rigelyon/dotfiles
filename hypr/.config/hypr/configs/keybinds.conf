$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$ipc = qs -c noctalia-shell ipc call

# 1. COMMONS
# -- Applications --
bindd = $mainMod, B, Open Browser, exec, xdg-open "https://" #"Open Browser"
bindd = $mainMod, T, Open Terminal, exec, $terminal #"Open Terminal"
bindd = $mainMod, Grave, Toggle Dropdown Terminal, exec, $scriptsDir/dropdown_term.sh #"Toggle Dropdown Terminal"
bindd = $mainMod, E, Open File Manager, exec, $fileManager #"Open File Manager"
bindd = , xf86Calculator, Open Calculator, exec, flatpak run org.gnome.Calculator #"Open Calculator"

# -- System UI & Launchers --
bindd = $mainMod, S, Open App Launcher, exec, $ipc launcher toggle #"Open App Launcher"
bindd = $mainMod, Escape, Open Control Center, exec, $ipc controlCenter toggle #"Open Control Center"
bindd = $mainMod, Comma, Open Settings, exec, $ipc settings toggle #"Open Settings"
bindd = $mainMod, F1, Open Keybinds Cheatsheet, exec, $ipc plugin:keybind-cheatsheet toggle #"Open Keybinds Cheatsheet"

# -- Tools & Accessibility --
bindd = $mainMod, V, Scratchpad, exec, $ipc launcher clipboard #"Open Clipboard
bindd = $mainMod, X, Scratchpad, exec, $ipc plugin:notes-scratchpad togglePanel #"Open Scratchpad"
bindd = $mainMod, Slash, Open AI Assistant, exec, $ipc plugin:assistant-panel toggle #"Open AI Assistant"
bindd = $mainMod SHIFT, Slash, Open AI Assistant, exec, $ipc plugin:assistant-panel clear #"Clear AI Assistant Chat"
bindd = $mainMod CTRL, mouse_down, Zoom in, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')" #"Zoom In"
bindd = $mainMod CTRL, mouse_up, Zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" #"Zoom Out"

# -- Power & Hardware --
bindld = , xf86Sleep, Sleep, exec, systemctl suspend #"Sleep"
bindld = , xf86Rfkill, Airplane Mode, exec, $scriptsDir/airplane_mode.sh
# bindld = , Airplane, Airplane Mode, exec, $scriptsDir/airplane_mode.sh #"Airplane Mode"

# 3. MEDIA
# -- Audio --
bindeld = , XF86AudioRaiseVolume, Volume Up, exec, $ipc volume increase #"Volume Up"
bindeld = , XF86AudioLowerVolume, Volume Down, exec, $ipc volume decrease #"Volume Down"
bindld = , XF86AudioMute, Volume Toggle, exec, $ipc volume muteOutput #"Volume Toggle"
bindld = , XF86AudioMicMute, Mic Toggle, exec, $ipc volume muteInput #"Mic Toggle"

# -- Brightness --
bindeld = , XF86MonBrightnessUp, Brightness Up, exec, $ipc brightness increase #"Brightness Up"
bindeld = , XF86MonBrightnessDown, Brightness Down, exec, $ipc brightness decrease #"Brightness Down"

# -- Playback Controls --
bindld = , xf86AudioPlay, Play, exec, $scriptsDir/mediactl.sh --play #"Play"
bindld = , xf86AudioPause, Pause, exec, $scriptsDir/mediactl.sh --pause #"Pause"
bindld = , xf86audiostop, Stop, exec, $scriptsDir/mediactl.sh --stop #"Stop"
bindld = , xf86AudioNext, Next Track, exec, $scriptsDir/mediactl.sh --next #"Next Track"
bindld = , xf86AudioPrev, Previous Track, exec, $scriptsDir/mediactl.sh --prev #"Previous Track"

# -- Unused --
# bindld = , xf86AudioPlayPause, Play/pause, exec, $scriptsDir/mediactl.sh --pause

# 4. SCREEN TOOLKIT
# -- Capture --
bindd = , Print, Screenshot, exec, $scriptsDir/screenshot.sh -m fullscreen #"Screenshot"
bindd = $mainMod, Print, Screenshot Area, exec, $scriptsDir/screenshot.sh -m area #"Screenshot Area"
bindd = SHIFT, Print, Record Sreen, exec, $scriptsDir/record.sh -m fullscreen -t 900 #"Record Screen"
bindd = $mainMod SHIFT, Print, Record Area, exec, $scriptsDir/record.sh -m area -t 900 #"Record Area"

# -- Tools --
bindd = $mainMod, Insert, OCR, exec, $ipc plugin:screen-shot-and-record ocr #"OCR Scan"
bindd = $mainMod, D, Toggle Annotation, exec, bash -lc "kill -USR1 $(pgrep -fo 'wayscriber --daemon')" #"Toggle Annotation"

# 5. WINDOW MANAGEMENT
# -- State & Lifecycle --
bindd = $mainMod, Q, Close Active Window, killactive, #"Close Active Window"
bindd = $mainMod SHIFT, Q, Terminate Active Process, exec, $scriptsDir/kill_active_process.sh #"Terminate Active Process"
bindd = $mainMod, F, Fullscreen, fullscreen #"Fullscreen"
bindd = $mainMod SHIFT, F, Maximize Window, fullscreen, 1 #"Maximize Window"
bindd = $mainMod, SPACE, Float Current Window, togglefloating, #"Float Current Window"
bindd = $mainMod ALT, SPACE, Float All Windows, exec, hyprctl dispatch workspaceopt allfloat #"Float All Windowss"
binddr = $mainMod, mouse:274, Toggle Minimize Tray, exec, $scriptsDir/hypr_minimize.sh toggle #"Toggle Minimize Tray"
binddr = $mainMod CTRL, mouse:274, Minimize Window, exec, $scriptsDir/hypr_minimize.sh push #"Minimize Window"
binddr = $mainMod CTRL ALT, mouse:274, Minimize All Windows, exec, $scriptsDir/hypr_minimize.sh push --all #"Minimize All Windows"
binddr = $mainMod SHIFT, mouse:274, Restore Minimized Window, exec, $scriptsDir/hypr_minimize.sh pop #"Restore Minimized Window"
binddr = $mainMod SHIFT ALT, mouse:274, Restore All Minimized Windows, exec, $scriptsDir/hypr_minimize.sh pop --all #"Restore All Minimized Windows"

# -- Focus & Navigation --
bindd = ALT, Tab, Cycle Next Window, cyclenext, #"Cycle Next Window,"
bindd = ALT, Tab, Bring Active Window to top, bringactivetotop, #"Bring Active Window"
bindd = $mainMod, Left, Focus Left, movefocus, l #"Focus Left"
bindd = $mainMod, Right, Focus Right, movefocus, r #"Focus Right"
bindd = $mainMod, Up, Focus Up, movefocus, u #"Focus Up"
bindd = $mainMod, Down, Focus Down, movefocus, d #"Focus Down"

# -- Move --
bindd = $mainMod CTRL, Left, Move Window Left, movewindow, l #"Move Window Left"
bindd = $mainMod CTRL, Right, Move Window Right, movewindow, r #"Move Window Right"
bindd = $mainMod CTRL, Up, Move Window Up, movewindow, u #"Move Window Up"
bindd = $mainMod CTRL, Down, Move Window Down, movewindow, d #"Move Window Down"

# -- Swap --
bindd = $mainMod ALT, Left, Swap Window Left, swapwindow, l #"Swap Window Left"
bindd = $mainMod ALT, Right, Swap Window Right, swapwindow, r #"Swap Window Right"
bindd = $mainMod ALT, Up, Swap Window Up, swapwindow, u #"Swap Window Up"
bindd = $mainMod ALT, Down, Swap Window Down, swapwindow, d #"Swap Window Down"

# -- Resize --
binded = $mainMod SHIFT, Left, Resize Window Left (-50), resizeactive, -50 0 #"Resize Window Left"
binded = $mainMod SHIFT, Right, Resize Window Right (+50), resizeactive, 50 0 #"Resize Window Right"
binded = $mainMod SHIFT, Up, Resize Window Up (-50), resizeactive, 0 -50 #"Resize Window Up"
binded = $mainMod SHIFT, Down, Resize Window Down (+50), resizeactive, 0 50 #"Resize Window Down"

# -- Mouse & System --
bindmd = $mainMod, mouse:272, Move window, movewindow # NOTE: mouse:272 = left click #"Move Window"
bindmd = $mainMod, mouse:273, Resize window, resizewindow # NOTE: mouse:272 = right click #"Resize Window"
bindd = CTRL ALT, Delete, Exit Hyprland, exec, hyprctl dispatch exit 0, #"Exit Hyprland"

# 7. WORKSPACE MANAGEMENT
# -- Navigation --
bindd = $mainMod, TAB, Next Workspace, workspace, m+1 #"Next Workspace"
bindd = $mainMod SHIFT, Tab, Previous Workspace, workspace, m-1 #"Previous Workspace"
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1 #"Next Workspace"
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1 #"Previous Workspace"

# -- Unused --
# bind = $mainMod CTRL, TAB, exec, $ipc plugin:workspace-overview toggle

# -- Special Workspace --
bindd = $mainMod, code:90, Special Workspace 0, togglespecialworkspace, num_0
bindd = $mainMod, code:87, Special Workspace 1, togglespecialworkspace, num_1
bindd = $mainMod, code:88, Special Workspace 2, togglespecialworkspace, num_2
bindd = $mainMod, code:89, Special Workspace 3, togglespecialworkspace, num_3
bindd = $mainMod, code:83, Special Workspace 4, togglespecialworkspace, num_4
bindd = $mainMod, code:84, Special Workspace 5, togglespecialworkspace, num_5
bindd = $mainMod, code:85, Special Workspace 6, togglespecialworkspace, num_6
bindd = $mainMod, code:79, Special Workspace 7, togglespecialworkspace, num_7
bindd = $mainMod, code:80, Special Workspace 8, togglespecialworkspace, num_8
bindd = $mainMod, code:81, Special Workspace 9, togglespecialworkspace, num_9

bindd = $mainMod SHIFT, code:90, Special Workspace 0, movetoworkspace, special:num_0
bindd = $mainMod SHIFT, code:87, Special Workspace 1, movetoworkspace, special:num_1
bindd = $mainMod SHIFT, code:88, Special Workspace 2, movetoworkspace, special:num_2
bindd = $mainMod SHIFT, code:89, Special Workspace 3, movetoworkspace, special:num_3
bindd = $mainMod SHIFT, code:83, Special Workspace 4, movetoworkspace, special:num_4
bindd = $mainMod SHIFT, code:84, Special Workspace 5, movetoworkspace, special:num_5
bindd = $mainMod SHIFT, code:85, Special Workspace 6, movetoworkspace, special:num_6
bindd = $mainMod SHIFT, code:79, Special Workspace 7, movetoworkspace, special:num_7
bindd = $mainMod SHIFT, code:80, Special Workspace 8, movetoworkspace, special:num_8
bindd = $mainMod SHIFT, code:81, Special Workspace 9, movetoworkspace, special:num_9

bindd = $mainMod CTRL, code:90, Special Workspace 0, movetoworkspacesilent, special:num_0
bindd = $mainMod CTRL, code:87, Special Workspace 1, movetoworkspacesilent, special:num_1
bindd = $mainMod CTRL, code:88, Special Workspace 2, movetoworkspacesilent, special:num_2
bindd = $mainMod CTRL, code:89, Special Workspace 3, movetoworkspacesilent, special:num_3
bindd = $mainMod CTRL, code:83, Special Workspace 4, movetoworkspacesilent, special:num_4
bindd = $mainMod CTRL, code:84, Special Workspace 5, movetoworkspacesilent, special:num_5
bindd = $mainMod CTRL, code:85, Special Workspace 6, movetoworkspacesilent, special:num_6
bindd = $mainMod CTRL, code:79, Special Workspace 7, movetoworkspacesilent, special:num_7
bindd = $mainMod CTRL, code:80, Special Workspace 8, movetoworkspacesilent, special:num_8
bindd = $mainMod CTRL, code:81, Special Workspace 9, movetoworkspacesilent, special:num_9

# -- Direct Switch (mod + 0-9) --
# bindd = $mainMod, 1, Workspace 1, workspace, 1 #"Workspace 1"
bindd = $mainMod, code:10, Workspace 1, workspace, 1
# bindd = $mainMod, 2, Workspace 2, workspace, 2 #"Workspace 2"
bindd = $mainMod, code:11, Workspace 2, workspace, 2
# bindd = $mainMod, 3, Workspace 3, workspace, 3 #"Workspace 3"
bindd = $mainMod, code:12, Workspace 3, workspace, 3
# bindd = $mainMod, 4, Workspace 4, workspace, 4 #"Workspace 4"
bindd = $mainMod, code:13, Workspace 4, workspace, 4
# bindd = $mainMod, 5, Workspace 5, workspace, 5 #"Workspace 5"
bindd = $mainMod, code:14, Workspace 5, workspace, 5
# bindd = $mainMod, 6, Workspace 6, workspace, 6 #"Workspace 6"
bindd = $mainMod, code:15, Workspace 6, workspace, 6
# bindd = $mainMod, 7, Workspace 7, workspace, 7 #"Workspace 7"
bindd = $mainMod, code:16, Workspace 7, workspace, 7
# bindd = $mainMod, 8, Workspace 8, workspace, 8 #"Workspace 8"
bindd = $mainMod, code:17, Workspace 8, workspace, 8
# bindd = $mainMod, 9, Workspace 9, workspace, 9 #"Workspace 9"
bindd = $mainMod, code:18, Workspace 9, workspace, 9
# bindd = $mainMod, 0, Workspace 0, workspace, 10 #"Workspace 0"
