# bindd = $mainMod SHIFT, 4, Move Window to Workspace 4, movetoworkspace, 4 #"Move Window to Workspace 4"
bindd = $mainMod SHIFT, code:13, Move Window to Workspace 4, movetoworkspace, 4
# bindd = $mainMod SHIFT, 5, Move Window to Workspace 5, movetoworkspace, 5 #"Move Window to Workspace 5"
bindd = $mainMod SHIFT, code:14, Move Window to Workspace 5, movetoworkspace, 5
# bindd = $mainMod SHIFT, 6, Move Window to Workspace 6, movetoworkspace, 6 #"Move Window to Workspace 6"
bindd = $mainMod SHIFT, code:15, Move Window to Workspace 6, movetoworkspace, 6
# bindd = $mainMod SHIFT, 7, Move Window to Workspace 7, movetoworkspace, 7 #"Move Window to Workspace 7"
bindd = $mainMod SHIFT, code:16, Move Window to Workspace 7, movetoworkspace, 7
# bindd = $mainMod SHIFT, 8, Move Window to Workspace 8, movetoworkspace, 8 #"Move Window to Workspace 8"
bindd = $mainMod SHIFT, code:17, Move Window to Workspace 8, movetoworkspace, 8
# bindd = $mainMod SHIFT, 9, Move Window to Workspace 9, movetoworkspace, 9 #"Move Window to Workspace 9"
bindd = $mainMod SHIFT, code:18, Move Window to Workspace 9, movetoworkspace, 9
# bindd = $mainMod SHIFT, 0, Move Window to Workspace 10, movetoworkspace, 10 #"Move Window to Workspace 0"
bindd = $mainMod SHIFT, code:19, Move Window to Workspace 10, movetoworkspace, 10

bindd = $mainMod SHIFT, bracketright, Move Window to Next Workspace, movetoworkspace, +1 #"Move Window to Next Workspace"
bindd = $mainMod SHIFT, bracketleft, Move Window to Previous Workspace, movetoworkspace, -1 #"Move Window to Previous Workspace"

# -- Move Silently to Workspace (mod + CTRL + 0-9) --
# bindd = $mainMod CTRL, 1, Move Silently to Workspace 1, movetoworkspacesilent, 1 #"Move Window Silently to Workspace 1"
bindd = $mainMod CTRL, code:10, Move Silently to Workspace 1, movetoworkspacesilent, 1
