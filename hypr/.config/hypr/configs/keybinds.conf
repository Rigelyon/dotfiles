$mod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$ipc = qs -c noctalia-shell ipc call

# 1. COMMONS
# -- Applications --
bindd = $mod, B, Open Browser, exec, xdg-open "https://" #"Open Browser"
bindd = $mod, T, Open Terminal, exec, $term #"Open Terminal"
bindd = $mod, E, Open File Manager, exec, $files #"Open File Manager"
bindd = , xf86Calculator, Open Calculator, exec, flatpak run org.gnome.Calculator #"Open Calculator"

# -- System UI & Launchers --
bindd = $mod, S, Open App Launcher, exec, $ipc launcher toggle #"Open App Launcher"
bindd = $mod, Escape, Open Control Center, exec, $ipc controlCenter toggle #"Open Control Center"
bindd = $mod, comma, Open Settings, exec, $ipc settings toggle #"Open Settings"
bindd = $mod, F1, Open Keybinds Cheatsheet, exec, $ipc plugin:keybind-cheatsheet toggle #"Open Keybinds Cheatsheet"

# -- Tools & Accessibility --
bindd = $mod, x, Scratchpad, exec, $ipc plugin:notes-scratchpad togglePanel #"Scratchpad"
bindd = $mod, slash, Open AI Assistant, exec, $ipc plugin:assistant-panel toggle #"Open AI Assistant"
bindd = $mod CTRL, mouse_down, Zoom in, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')" #"Zoom In"
bindd = $mod CTRL, mouse_up, Zoom out, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" #"Zoom Out"

# -- Power & Hardware --
bindld = , xf86Sleep, Sleep, exec, systemctl suspend #"Sleep"
bindld = , xf86Rfkill, Airplane Mode, exec, $scriptsDir/airplane_mode.sh
# bindld = , Airplane, Airplane Mode, exec, $scriptsDir/airplane_mode.sh #"Airplane Mode"

# 3. MEDIA
# -- Audio --
bindeld = , XF86AudioRaiseVolume, Volume Up, exec, $ipc volume increase #"Volume Up"
bindeld = , XF86AudioLowerVolume, Volume Down, exec, $ipc volume decrease #"Volume Down"
bindld = , XF86AudioMute, Volume Mute, exec, $ipc volume muteOutput #"Volume Mute"

# -- Brightness --
bindeld = , XF86MonBrightnessUp, Brightness Up, exec, $ipc brightness increase #"Brightness Up"
bindeld = , XF86MonBrightnessDown, Brightness Down, exec, $ipc brightness decrease #"Brightness Down"

# -- Playback Controls --
bindld = , xf86AudioPlay, Play, exec, $scriptsDir/mediactl.sh --pause #"Play"
bindld = , xf86AudioPause, Pause, exec, $scriptsDir/mediactl.sh --pause #"Pause"
bindld = , xf86audiostop, Stop, exec, $scriptsDir/mediactl.sh --stop #"Stop"
bindld = , xf86AudioNext, Next Track, exec, $scriptsDir/mediactl.sh --next #"Next Track"
bindld = , xf86AudioPrev, Previous Track, exec, $scriptsDir/mediactl.sh --prev #"Previous Track"

# -- Unused --
# bindld = , xf86AudioPlayPause, Play/pause, exec, $scriptsDir/mediactl.sh --pause

# 4. SCREEN TOOLKIT
# -- Capture --
bindd = , Print, Screenshot, exec, $scriptsDir/screenshot.sh -m fullscreen #"Screenshot"
bindd = $mod, Print, Screenshot Area, exec, $scriptsDir/screenshot.sh -m area #"Screenshot Area"
bindd = SHIFT, Print, Record Sreen, exec, $scriptsDir/record.sh -m fullscreen -t 900 #"Record Screen"
bindd = $mod SHIFT, Print, Record Area, exec, $scriptsDir/record.sh -m area -t 900 #"Record Area"

# -- Tools --
bindd = $mod, Insert, OCR, exec, $ipc plugin:screen-shot-and-record ocr #"OCR Scan"
bindd = $mod, D, Toggle Annotation, exec, bash -lc "kill -USR1 $(pgrep -fo 'wayscriber --daemon')" #"Toggle Annotation"

# 5. WINDOW MANAGEMENT
# -- State & Lifecycle --
bindd = $mod, Q, Close Active Window, killactive, #"Close Active Window"
bindd = $mod SHIFT, Q, Terminate Active Process, exec, $scriptsDir/kill_active_process.sh #"Terminate Active Process"
bindd = $mod, F, Fullscreen, fullscreen #"Fullscreen"
bindd = $mod SHIFT, F, Maximize Window, fullscreen, 1 #"Maximize Window"
bindd = $mod, SPACE, Float Current Window, togglefloating, #"Float Current Window"
bindd = $mod ALT, SPACE, Float All Windows, exec, hyprctl dispatch workspaceopt allfloat #"Float All Windowss"

# -- Focus & Navigation --
bindd = $mod, left, Focus Left, movefocus, l #"Focus Left"
bindd = $mod, right, Focus Right, movefocus, r #"Focus Right"
bindd = $mod, up, Focus Up, movefocus, u #"Focus Up"
bindd = $mod, down, Focus Down, movefocus, d #"Focus Down"
bindd = ALT, tab, Cycle Next Window, cyclenext, #"Cycle Next Window,"
bindd = ALT, tab, Bring Active Window to top, bringactivetotop, #"Bring Active Window"

# -- Move --
bindd = $mod CTRL, left, Move Window Left, movewindow, l #"Move Window Left"
bindd = $mod CTRL, right, Move Window Right, movewindow, r #"Move Window Right"
bindd = $mod CTRL, up, Move Window Up, movewindow, u #"Move Window Up"
bindd = $mod CTRL, down, Move Window Down, movewindow, d #"Move Window Down"

# -- Swap --
bindd = $mod ALT, left, Swap Window Left, swapwindow, l #"Swap Window Left"
bindd = $mod ALT, right, Swap Window Right, swapwindow, r #"Swap Window Right"
bindd = $mod ALT, up, Swap Window Up, swapwindow, u #"Swap Window Up"
bindd = $mod ALT, down, Swap Window Down, swapwindow, d #"Swap Window Down"

# -- Resize --
binded = $mod SHIFT, left, Resize Window Left (-50), resizeactive, -50 0 #"Resize Window Left"
binded = $mod SHIFT, right, Resize Window Right (+50), resizeactive, 50 0 #"Resize Window Right"
binded = $mod SHIFT, up, Resize Window Up (-50), resizeactive, 0 -50 #"Resize Window Up"
binded = $mod SHIFT, down, Resize Window Down (+50), resizeactive, 0 50 #"Resize Window Down"

# -- Mouse & System --
bindmd = $mod, mouse:272, Move window, movewindow # NOTE: mouse:272 = left click #"Move Window"
bindmd = $mod, mouse:273, Resize window, resizewindow # NOTE: mouse:272 = right click #"Resize Window"
bindd = CTRL ALT, Delete, Exit Hyprland, exec, hyprctl dispatch exit 0, #"Exit Hyprland"

# 7. WORKSPACE MANAGEMENT
# -- Navigation --
bindd = $mod, TAB, Next Workspace, workspace, m+1 #"Next Workspace"
bindd = $mod SHIFT, tab, Previous Workspace, workspace, m-1 #"Previous Workspace"
bindd = $mod, mouse_down, Next workspace, workspace, e+1 #"Next Workspace"
bindd = $mod, mouse_up, Previous workspace, workspace, e-1 #"Previous Workspace"

# -- Unused --
# bind = $mod CTRL, TAB, exec, $ipc plugin:workspace-overview toggle

# -- Special Workspace (Minimization) --
bindd = $mod, m, Toggle Special Workspace, togglespecialworkspace, #"Toggle Special Workspace"
bindd = $mod SHIFT, m, Move to Special Workspace, movetoworkspace, special #"Move to Special Workspace"
bindd = $mod CTRL, m, Move Silently to Special Workspace, movetoworkspacesilent, special #"Move Silently to Special Workspace"

# -- Direct Switch (mod + 0-9) --
# bindd = $mod, 1, Workspace 1, workspace, 1 #"Workspace 1"
bindd = $mod, code:10, Workspace 1, workspace, 1 
# bindd = $mod, 2, Workspace 2, workspace, 2 #"Workspace 2"
bindd = $mod, code:11, Workspace 2, workspace, 2 
# bindd = $mod, 3, Workspace 3, workspace, 3 #"Workspace 3"
bindd = $mod, code:12, Workspace 3, workspace, 3 
# bindd = $mod, 4, Workspace 4, workspace, 4 #"Workspace 4"
bindd = $mod, code:13, Workspace 4, workspace, 4 
# bindd = $mod, 5, Workspace 5, workspace, 5 #"Workspace 5"
bindd = $mod, code:14, Workspace 5, workspace, 5 
# bindd = $mod, 6, Workspace 6, workspace, 6 #"Workspace 6"
bindd = $mod, code:15, Workspace 6, workspace, 6 
# bindd = $mod, 7, Workspace 7, workspace, 7 #"Workspace 7"
bindd = $mod, code:16, Workspace 7, workspace, 7 
# bindd = $mod, 8, Workspace 8, workspace, 8 #"Workspace 8"
bindd = $mod, code:17, Workspace 8, workspace, 8 
# bindd = $mod, 9, Workspace 9, workspace, 9 #"Workspace 9"
bindd = $mod, code:18, Workspace 9, workspace, 9 
# bindd = $mod, 0, Workspace 0, workspace, 10 #"Workspace 0"
bindd = $mod, code:19, Workspace 10, workspace, 10 

# -- Move to Workspace (mod + SHIFT + 0-9) --
# bindd = $mod SHIFT, 1, Move Window to Workspace 1, movetoworkspace, 1 #"Move Window to Workspace 1"
bindd = $mod SHIFT, code:10, Move Window to Workspace 1, movetoworkspace, 1 
# bindd = $mod SHIFT, 2, Move Window to Workspace 2, movetoworkspace, 2 #"Move Window to Workspace 2"
bindd = $mod SHIFT, code:11, Move Window to Workspace 2, movetoworkspace, 2 
# bindd = $mod SHIFT, 3, Move Window to Workspace 3, movetoworkspace, 3 #"Move Window to Workspace 3"
bindd = $mod SHIFT, code:12, Move Window to Workspace 3, movetoworkspace, 3 
# bindd = $mod SHIFT, 4, Move Window to Workspace 4, movetoworkspace, 4 #"Move Window to Workspace 4"
bindd = $mod SHIFT, code:13, Move Window to Workspace 4, movetoworkspace, 4 
# bindd = $mod SHIFT, 5, Move Window to Workspace 5, movetoworkspace, 5 #"Move Window to Workspace 5"
bindd = $mod SHIFT, code:14, Move Window to Workspace 5, movetoworkspace, 5 
# bindd = $mod SHIFT, 6, Move Window to Workspace 6, movetoworkspace, 6 #"Move Window to Workspace 6"
bindd = $mod SHIFT, code:15, Move Window to Workspace 6, movetoworkspace, 6 
# bindd = $mod SHIFT, 7, Move Window to Workspace 7, movetoworkspace, 7 #"Move Window to Workspace 7"
bindd = $mod SHIFT, code:16, Move Window to Workspace 7, movetoworkspace, 7 
# bindd = $mod SHIFT, 8, Move Window to Workspace 8, movetoworkspace, 8 #"Move Window to Workspace 8"
bindd = $mod SHIFT, code:17, Move Window to Workspace 8, movetoworkspace, 8 
# bindd = $mod SHIFT, 9, Move Window to Workspace 9, movetoworkspace, 9 #"Move Window to Workspace 9"
bindd = $mod SHIFT, code:18, Move Window to Workspace 9, movetoworkspace, 9 
# bindd = $mod SHIFT, 0, Move Window to Workspace 10, movetoworkspace, 10 #"Move Window to Workspace 0"
bindd = $mod SHIFT, code:19, Move Window to Workspace 10, movetoworkspace, 10 

bindd = $mod SHIFT, bracketright, Move Window to Next Workspace, movetoworkspace, +1 #"Move Window to Next Workspace"
bindd = $mod SHIFT, bracketleft, Move Window to Previous Workspace, movetoworkspace, -1 #"Move Window to Previous Workspace"

# -- Move Silently to Workspace (mod + CTRL + 0-9) --
# bindd = $mod CTRL, 1, Move Silently to Workspace 1, movetoworkspacesilent, 1 #"Move Window Silently to Workspace 1"
bindd = $mod CTRL, code:10, Move Silently to Workspace 1, movetoworkspacesilent, 1 
# bindd = $mod CTRL, 2, Move Silently to Workspace 2, movetoworkspacesilent, 2 #"Move Window Silently to Workspace 2"
bindd = $mod CTRL, code:11, Move Silently to Workspace 2, movetoworkspacesilent, 2 
# bindd = $mod CTRL, 3, Move Silently to Workspace 3, movetoworkspacesilent, 3 #"Move Window Silently to Workspace 3"
bindd = $mod CTRL, code:12, Move Silently to Workspace 3, movetoworkspacesilent, 3 
# bindd = $mod CTRL, 4, Move Silently to Workspace 4, movetoworkspacesilent, 4 #"Move Window Silently to Workspace 4"
bindd = $mod CTRL, code:13, Move Silently to Workspace 4, movetoworkspacesilent, 4 
# bindd = $mod CTRL, 5, Move Silently to Workspace 5, movetoworkspacesilent, 5 #"Move Window Silently to Workspace 5"
bindd = $mod CTRL, code:14, Move Silently to Workspace 5, movetoworkspacesilent, 5 
# bindd = $mod CTRL, 6, Move Silently to Workspace 6, movetoworkspacesilent, 6 #"Move Window Silently to Workspace 6"
bindd = $mod CTRL, code:15, Move Silently to Workspace 6, movetoworkspacesilent, 6 
# bindd = $mod CTRL, 7, Move Silently to Workspace 7, movetoworkspacesilent, 7 #"Move Window Silently to Workspace 7"
bindd = $mod CTRL, code:16, Move Silently to Workspace 7, movetoworkspacesilent, 7 
# bindd = $mod CTRL, 8, Move Silently to Workspace 8, movetoworkspacesilent, 8 #"Move Window Silently to Workspace 8"
bindd = $mod CTRL, code:17, Move Silently to Workspace 8, movetoworkspacesilent, 8 
# bindd = $mod CTRL, 9, Move Silently to Workspace 9, movetoworkspacesilent, 9 #"Move Window Silently to Workspace 9"
bindd = $mod CTRL, code:18, Move Silently to Workspace 9, movetoworkspacesilent, 9 
# bindd = $mod CTRL, 0, Move Silently to Workspace 10, movetoworkspacesilent, 10 #"Move Window Silently to Workspace 0"
bindd = $mod CTRL, code:19, Move Silently to Workspace 10, movetoworkspacesilent, 10 

bindd = $mod CTRL, bracketright, Move Silently to Next Workspace, movetoworkspacesilent, +1 #"Move Window Silently to Next Workspace"
bindd = $mod CTRL, bracketleft, Move Silently to Previous Workspace, movetoworkspacesilent, -1 #"Move Window Silently to Previous Workspace"