# bindd = $mainMod CTRL, 9, Move Silently to Workspace 9, movetoworkspacesilent, 9 #"Move Window Silently to Workspace 9"
bindd = $mainMod CTRL, code:18, Move Silently to Workspace 9, movetoworkspacesilent, 9
# bindd = $mainMod CTRL, 0, Move Silently to Workspace 10, movetoworkspacesilent, 10 #"Move Window Silently to Workspace 0"
bindd = $mainMod CTRL, code:19, Move Silently to Workspace 10, movetoworkspacesilent, 10

bindd = $mainMod CTRL, bracketright, Move Silently to Next Workspace, movetoworkspacesilent, +1 #"Move Window Silently to Next Workspace"
bindd = $mainMod CTRL, bracketleft, Move Silently to Previous Workspace, movetoworkspacesilent, -1 #"Move Window Silently to Previous Workspace"
